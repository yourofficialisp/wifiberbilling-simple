<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <!-- Gold padlock gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Gold shackle gradient -->
    <linearGradient id="shackleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <!-- Purple glow gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <!-- Keyhole gradient -->
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner shadow filter -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.3" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect rx="96" ry="96" width="512" height="512"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <g clip-path="url(#roundedRect)" opacity="0.05">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#7c3aed" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#7c3aed" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#7c3aed" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#7c3aed" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#7c3aed" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#7c3aed" stroke-width="1"/>
  </g>

  <!-- Purple glow aura behind padlock -->
  <ellipse cx="256" cy="290" rx="160" ry="140" fill="url(#glowGrad)"/>

  <!-- WiFi arc waves radiating - bottom left area -->
  <g opacity="0.6" fill="none" stroke="#818cf8" stroke-linecap="round">
    <!-- WiFi arcs (top-left position) -->
    <path d="M 90 190 A 30 30 0 0 1 130 190" stroke-width="10" opacity="0.9"/>
    <path d="M 70 170 A 60 60 0 0 1 150 170" stroke-width="8" opacity="0.6"/>
    <path d="M 50 150 A 90 90 0 0 1 170 150" stroke-width="6" opacity="0.35"/>
  </g>

  <!-- WiFi arc waves - bottom right area -->
  <g opacity="0.6" fill="none" stroke="#a78bfa" stroke-linecap="round">
    <path d="M 382 190 A 30 30 0 0 0 422 190" stroke-width="10" opacity="0.9"/>
    <path d="M 362 170 A 60 60 0 0 0 442 170" stroke-width="8" opacity="0.6"/>
    <path d="M 342 150 A 90 90 0 0 0 462 150" stroke-width="6" opacity="0.35"/>
  </g>

  <!-- ISP signal dots -->
  <circle cx="110" cy="192" r="7" fill="#6366f1" opacity="0.9"/>
  <circle cx="402" cy="192" r="7" fill="#8b5cf6" opacity="0.9"/>

  <!-- ===== PADLOCK ===== -->
  <!-- Padlock shackle (the arc/loop part) -->
  <path d="M 180 248 L 180 200 A 76 76 0 0 1 332 200 L 332 248"
        fill="none"
        stroke="url(#shackleGrad)"
        stroke-width="32"
        stroke-linecap="round"
        filter="url(#shadow)"/>

  <!-- Shackle shine highlight -->
  <path d="M 188 248 L 188 202 A 68 68 0 0 1 256 140"
        fill="none"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Padlock body -->
  <rect x="140" y="248" width="232" height="196" rx="28" ry="28"
        fill="url(#goldGrad)"
        filter="url(#shadow)"/>

  <!-- Body top highlight -->
  <rect x="140" y="248" width="232" height="50" rx="28" ry="28"
        fill="rgba(255,255,255,0.15)"/>

  <!-- Body bottom shadow -->
  <rect x="140" y="380" width="232" height="64" rx="28" ry="28"
        fill="rgba(0,0,0,0.15)"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="322" r="34" fill="url(#keyGrad)"/>
  <circle cx="256" cy="322" r="28" fill="#0f172a"/>

  <!-- Keyhole slot - the G shaped integrated keyhole -->
  <rect x="246" y="332" width="20" height="36" rx="10" ry="10" fill="#0f172a"/>

  <!-- Subtle G letterform in keyhole -->
  <text x="256" y="330" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-weight="900" font-size="28"
        fill="url(#goldGrad)" opacity="0.75">G</text>

  <!-- Body side sheen -->
  <rect x="140" y="258" width="20" height="176" rx="10" ry="0"
        fill="rgba(255,255,255,0.12)"/>

  <!-- Small circuit dots decoration -->
  <circle cx="175" cy="420" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="337" cy="420" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="175" cy="400" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="337" cy="400" r="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Bottom subtle glow line -->
  <line x1="176" y1="444" x2="336" y2="444" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>

</svg>
